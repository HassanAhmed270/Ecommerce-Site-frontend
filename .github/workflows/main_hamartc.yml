name: Build and deploy Node.js app to Azure Web App - HaMartC

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Build Vite app
        run: npm run build

      # 🔥 ONLY DIST SHOULD BE DEPLOYED
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # ✅ USE YOUR EXISTING SECRETS (correct)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_DD4E2A203BF6403E8D40610BCC6C2686 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9A9570BC758C4E598E3E3DAA6BAB1D55 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C63B43DC24EF48DE9F4DC1416AD87267 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'HaMartC'
          slot-name: 'Production'
          package: dist